<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code & Barcode Generator</title>
    <meta name="description"
        content="Generate QR Code dan Barcode secara massal, siap cetak untuk printer barcode Intermec." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- ========== INPUT PAGE ========== -->
    <div id="page-input" class="page active">
        <header class="app-header">
            <div class="logo">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="14" height="14" rx="2" fill="#7c5dfa" />
                    <rect x="18" width="14" height="14" rx="2" fill="#7c5dfa" opacity="0.6" />
                    <rect y="18" width="14" height="14" rx="2" fill="#7c5dfa" opacity="0.6" />
                    <rect x="18" y="18" width="14" height="14" rx="2" fill="#7c5dfa" opacity="0.3" />
                </svg>
                <h1>QR & Barcode <span class="gradient-text">Generator</span></h1>
            </div>
            <p class="subtitle">Generate QR Codes & Barcodes secara massal, siap cetak.</p>
        </header>

        <main class="container">
            <!-- Controls row -->
            <section class="controls-section">
                <div class="control-group">
                    <label for="type-select">Tipe Kode</label>
                    <select id="type-select">
                        <option value="qrcode">QR Code</option>
                        <option value="barcode">Barcode (Code128)</option>
                    </select>
                </div>
                <label class="btn btn-secondary" for="file-import" id="btn-import">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Import Excel / CSV
                    <input type="file" id="file-import" accept=".xlsx,.xls,.csv" hidden />
                </label>
            </section>

            <!-- Input form -->
            <section class="form-section glass-card">
                <h2>Tambah Data</h2>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="input-kode">Kode (isi QR/Barcode)</label>
                        <input type="text" id="input-kode" placeholder="contoh: INV-2026-001" />
                    </div>
                    <div class="form-field">
                        <label for="input-nama1">Nama 1</label>
                        <input type="text" id="input-nama1" placeholder="contoh: John Doe" />
                    </div>
                    <div class="form-field">
                        <label for="input-nama2">Nama 2</label>
                        <input type="text" id="input-nama2" placeholder="contoh: Dept. IT" />
                    </div>
                    <div class="form-field">
                        <label for="input-nama3">Nama 3</label>
                        <input type="text" id="input-nama3" placeholder="contoh: Lantai 3" />
                    </div>
                </div>
                <button id="btn-add" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Tambah
                </button>
            </section>

            <!-- Data table -->
            <section class="table-section glass-card">
                <div class="table-header">
                    <h2>Data (<span id="data-count">0</span> item)</h2>
                    <button id="btn-clear" class="btn btn-danger btn-sm">Hapus Semua</button>
                </div>
                <div class="table-wrapper">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Kode</th>
                                <th>Nama 1</th>
                                <th>Nama 2</th>
                                <th>Nama 3</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody"></tbody>
                    </table>
                    <div id="empty-state" class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                            <rect x="3" y="3" width="18" height="18" rx="2" />
                            <line x1="9" y1="3" x2="9" y2="21" />
                            <line x1="3" y1="9" x2="21" y2="9" />
                        </svg>
                        <p>Belum ada data. Tambah manual atau import dari file.</p>
                    </div>
                </div>
            </section>

            <!-- Generate button -->
            <section class="action-section">
                <button id="btn-generate" class="btn btn-primary btn-lg" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Generate &amp; Preview
                </button>
            </section>
        </main>
    </div>

    <!-- ========== PREVIEW MODAL POPUP ========== -->
    <div id="preview-modal" class="modal-overlay" style="display:none;">
        <div class="modal-container">
            <header class="modal-header no-print">
                <h2 class="preview-title">Preview Cetak</h2>
                <div class="modal-header-actions">
                    <button id="btn-print" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" />
                            <rect x="6" y="14" width="12" height="8" />
                        </svg>
                        Cetak
                    </button>
                    <button id="btn-close-modal" class="btn-close-modal" title="Tutup">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>
            </header>

            <div class="modal-body">
                <div id="print-area" class="print-area">
                    <!-- Generated cards go here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Libraries from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
